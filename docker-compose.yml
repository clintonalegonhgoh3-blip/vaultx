# docker-compose.yml — VaultX Stack complète
version: "3.9"

services:
  # ─── Frontend React (Vite build statique) ───
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - vaultx-net
    restart: unless-stopped

  # ─── Backend Node.js (API de sync optionnelle) ───
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://vaultx:${DB_PASSWORD}@postgres:5432/vaultx
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vaultx-net
    restart: unless-stopped

  # ─── Base de données PostgreSQL ───
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=vaultx
      - POSTGRES_USER=vaultx
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    networks:
      - vaultx-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaultx"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  vaultx-net:
    driver: bridge
